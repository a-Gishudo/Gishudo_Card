<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AR名刺 - カメラ起動</title>
  
  <!-- A-Frame と AR.js の読み込み -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.1/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>

  <script>
    // タップされたときに、同じタブ（画面）のままリンク先を開く設定（Safariのブロック対策）
    AFRAME.registerComponent('navigate-on-click', {
      schema: { url: { default: '' } },
      init: function () {
        var data = this.data;
        this.el.addEventListener('click', function () {
          window.location.href = data.url;
        });
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">
  <!-- タップを認識させるために cursor="rayorigin: mouse" を確実に指定 -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayorigin: mouse" raycaster="objects: .clickable">
    
    <!-- 1. 目印（マーカー）の指定 -->
    <a-marker type="pattern" url="pattern-Gichan.patt">
      
      <!-- 2. 飛び出すキャラクター画像（縦横比を修正した状態） -->
      <a-image src="Gichan_3D.png" position="0 0.5 0" width="1" height="1.5" rotation="-90 0 0"></a-image>

      <!-- 3. 左側ボタン（青い箱：会社HPへ同じ画面で遷移） -->
      <a-box class="clickable" position="-0.7 0.5 0" width="0.4" height="0.4" depth="0.1" rotation="-90 0 0" material="color: #1E90FF; opacity: 0.8"
             navigate-on-click="url: http://www.gishudo.co.jp/"></a-box>

      <!-- 4. 右側ボタン（緑の箱：プロフィールへ同じ画面で遷移） -->
      <a-box class="clickable" position="0.7 0.5 0" width="0.4" height="0.4" depth="0.1" rotation="-90 0 0" material="color: #32CD32; opacity: 0.8"
             navigate-on-click="url: ../AR_Profile/index.html"></a-box>

    </a-marker>

    <!-- カメラ設定 -->
    <a-entity camera></a-entity>
  </scene>
</body>
</html>
