<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AR名刺 - カメラ起動</title>
  
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.1/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    /* 画面下部にボタンを浮かせるためのCSS（スマホでも絶対にタップできます） */
    .button-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 9999; /* AR映像よりも必ず手前に表示する設定 */
    }

    .ar-btn {
      display: block;
      width: 130px;
      padding: 15px 0;
      text-align: center;
      text-decoration: none;
      color: #ffffff;
      font-weight: bold;
      font-size: 14px;
      border-radius: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }

    /* 青いボタン（会社HP） */
    .btn-hp {
      background-color: #1E90FF;
    }

    /* 緑のボタン（プロフィール） */
    .btn-profile {
      background-color: #32CD32;
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- 【追加】画面に絶対に表示され、確実にタップできるボタンエリア -->
  <div class="button-container">
    <a href="http://www.gishudo.co.jp/" class="ar-btn btn-hp">会社HP</a>
    <a href="../AR_Profile/index.html" class="ar-btn btn-profile">プロフィール</a>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-marker type="pattern" url="pattern-Gichan.patt">
      
      <!-- キャラクター画像（つぶれ修正済み） -->
      <a-image src="Gichan_3D.png" position="0 0.5 0" width="1" height="1.5" rotation="-90 0 0"></a-image>

      <!-- 3Dの箱はタップ用の目印ではなく「装飾（見た目用）」として残しておきます -->
      <!-- 左の青い箱 -->
      <a-box position="-0.7 0.5 0" width="0.4" height="0.4" depth="0.1" rotation="-90 0 0" material="color: #1E90FF; opacity: 0.8"></a-box>

      <!-- 右の緑の箱 -->
      <a-box position="0.7 0.5 0" width="0.4" height="0.4" depth="0.1" rotation="-90 0 0" material="color: #32CD32; opacity: 0.8"></a-box>

    </a-marker>

    <!-- カメラ設定 -->
    <a-entity camera></a-entity>
  </scene>
</body>
</html>
