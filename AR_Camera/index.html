<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AR名刺 - カメラ起動</title>
  
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.1/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    /* ボタン全体の共通設定（雲の形にするための設定） */
    .ar-btn {
      position: fixed;
      /* 【修正】位置を若干下げました（中央 50% から 60% に変更） */
      top: 60%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      
      /* 雲のようなモコモコした形を作るためのサイズと角丸 */
      width: 120px;
      height: 75px;
      padding: 5px;
      text-align: center;
      text-decoration: none;
      color: #333333; /* 文字色は見やすいように濃いグレーに */
      font-weight: bold;
      font-size: 13px;
      line-height: 1.3;
      
      /* 特殊な角丸を組み合わせて雲の形を表現 */
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      z-index: 9999;
    }

    /* 雲のモコモコ感を補強する疑似要素（ボタンの左右に丸みをプラス） */
    .ar-btn::before, .ar-btn::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
      z-index: -1;
    }
    /* 左側のモコモコ */
    .ar-btn::before {
      width: 50px;
      height: 50px;
      top: 10px;
      left: -15px;
    }
    /* 右側のモコモコ */
    .ar-btn::after {
      width: 60px;
      height: 60px;
      top: 5px;
      right: -15px;
    }

    /* 【修正】技秀堂HP（くすみのある優しい水色、パステル系） */
    .btn-hp {
      left: 35px; /* モコモコが画面からはみ出さないように少し内側に寄せました */
      background-color: #A2D2FF;
    }

    /* 【修正】プロフィール（暖かみのある、くすみイエロー） */
    .btn-profile {
      right: 35px; /* 同様に少し内側に寄せています */
      background-color: #FEF08A;
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- 【修正】文字を「技秀堂HP」に変更し、別タブ設定を維持 -->
  <a href="http://www.gishudo.co.jp/" target="_blank" rel="noopener noreferrer" class="ar-btn btn-hp">技秀堂HP</a>
  <a href="../AR_Profile/index.html" target="_blank" rel="noopener noreferrer" class="ar-btn btn-profile">プロフィール</a>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-marker type="pattern" url="pattern-Gichan.patt">
      
      <!-- キャラクター画像（大きいサイズ） -->
      <a-image src="Gichan_AR.png" position="0 0.5 0" width="1.5" height="2.25" rotation="-90 0 0"></a-image>

    </a-marker>

    <!-- カメラ設定 -->
    <a-entity camera></a-entity>
  </scene>
</body>
</html>
