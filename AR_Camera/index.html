<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AR名刺 - カメラ起動</title>
  
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.1/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    /* ボタンを画面の中央の高さで、左右に分けて配置する設定 */
    .ar-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%); /* 上下だけ中央に合わせる */
      display: block;
      width: 120px;
      padding: 15px 0;
      text-align: center;
      text-decoration: none;
      color: #ffffff;
      font-weight: bold;
      font-size: 14px;
      border-radius: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      z-index: 9999;
    }

    /* 青いボタン（画面の左端中央） */
    .btn-hp {
      left: 20px;
      background-color: #1E90FF;
    }

    /* 緑のボタン（画面の右端中央） */
    .btn-profile {
      right: 20px;
      background-color: #32CD32;
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- 画面左右のボタン設定（別タブ指定付き） -->
  <a href="http://www.gishudo.co.jp/" target="_blank" rel="noopener noreferrer" class="ar-btn btn-hp">会社HP</a>
  <a href="../AR_Profile/index.html" target="_blank" rel="noopener noreferrer" class="ar-btn btn-profile">プロフィール</a>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-marker type="pattern" url="pattern-Gichan.patt">
      
      <!-- キャラクター画像のみを表示（周囲の箱は完全に削除しました） -->
      <a-image src="Gichan_3D.png" position="0 0.5 0" width="1.5" height="2.25" rotation="-90 0 0"></a-image>

    </a-marker>

    <!-- カメラ設定 -->
    <a-entity camera></a-entity>
  </scene>
</body>
</html>
