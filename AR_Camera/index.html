<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AR名刺 - カメラ起動</title>
  
  <!-- A-Frame と AR.js の安定版ライブラリ -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.1/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    /* 左右の「雲ボタン」の共通デザイン */
    .ar-btn {
      position: fixed;
      /* 位置を画面の中央より「若干下げた」絶妙な高さ（60%）に設定 */
      top: 60%; 
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      
      /* くま耳に見えない、なめらかで自然な雲の形を作るサイズ */
      width: 130px;
      height: 65px;
      padding: 5px;
      text-align: center;
      text-decoration: none;
      color: #333333; /* 文字は読みやすいくすみグレー */
      font-weight: bold;
      font-size: 13px;
      line-height: 1.3;
      
      /* いびつな丸みを組み合わせて「ふんわりした雲」を表現 */
      border-radius: 70% 40% 60% 30% / 60% 50% 50% 40%;
      box-shadow: 0 6px 15px rgba(0,0,0,0.12);
      z-index: 9999;
    }

    /* 左側のボタン：技秀堂HP（優しいくすみパステルブルー） */
    .btn-hp {
      left: 25px;
      background-color: #A2D2FF;
    }

    /* 右側のボタン：プロフィール（暖かみのあるくすみパステルイエロー） */
    .btn-profile {
      right: 25px;
      background-color: #FEF08A;
      /* 左右で形のちがう自然な雲にするため、角丸の数値を少し反転 */
      border-radius: 40% 70% 30% 60% / 50% 60% 40% 50%;
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- スマホ画面に重なる雲ボタン（別タブで100%開く設定） -->
  <a href="http://www.gishudo.co.jp/" target="_blank" rel="noopener noreferrer" class="ar-btn btn-hp">技秀堂HP</a>
  <a href="../AR_Profile/index.html" target="_blank" rel="noopener noreferrer" class="ar-btn btn-profile">プロフィール</a>

  <!-- AR空間の設定 -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- マーカートラック（pattern-Gichan.patt を目印にする） -->
    <a-marker type="pattern" url="pattern-Gichan.patt">
      
      <!-- 
        【ARで飛び出る新しい画像設定】
        ・ファイル名を「Gichan_AR.png」に修正
        ・画像サイズを少し大きめ（幅2.0、高さ3.0）に調整し、かざした時の迫力をアップ！
      -->
      <a-image src="Gichan_AR.png" position="0 0.5 0" width="2.0" height="3.0" rotation="-90 0 0"></a-image>

    </a-marker>

    <!-- ARカメラの設定 -->
    <a-entity camera></a-entity>
  </scene>
</body>
</html>
