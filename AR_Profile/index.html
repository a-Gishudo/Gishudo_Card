<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT ME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-card">
        <header class="card-header">
            ABOUT ME
        </header>

        <div class="card-body">
            <!-- 上部セクション（左：書体ボックス、右：情報エリア） -->
            <div class="top-section">
                <!-- 左側：書体ボックス -->
                <div class="font-style-box">
                    <span class="font-label">わたしが選んだ書体</span>
                    <div class="font-details">
                        <!-- ここに「技」の画像か文字を入れます -->
                        <img src="Font.png" alt="技の画像" class="kanji-image">
                        <span class="font-name">正楷書CB1
                        </span>
                    </div>
                </div>
                
                <!-- 右側：情報エリア（名前〜色、キャラ） -->
                <div class="info-area">
                    <div class="info-details-container">
                        <!-- テキスト情報スタック -->
                        <div class="info-text-stack">
                            <div class="info-row">
                                <span class="label">名　前：</span>
                                <span class="value">技秀堂 太郎</span>
                            </div>
                            <div class="info-row">
                                <span class="label">出身地：</span>
                                <span class="value">東京都</span>
                            </div>
                            <div class="info-row">
                                <span class="label">血液型：</span>
                                <span class="value">A型</span>
                            </div>
                        </div>
                        <!-- キャラクター画像 -->
                        <div class="character-image">
                            <img src="Gichan.gif" alt="キャラクター"> 
                        </div>
                    </div>
                </div>
            </div>

            <!-- 下部グリッドセクション -->
            <div class="profile-grid">
                <div class="grid-item">
                    <div class="item-title">性格</div>
                    <div class="item-content">真面目</div>
                </div>
                <div class="grid-item">
                    <div class="item-title">座右の銘</div>
                    <div class="item-content">初志貫徹</div>
                </div>
                <div class="grid-item">
                    <div class="item-title">マイブーム</div>
                    <div class="item-content">DIY</div>
                </div>
                <div class="grid-item">
                    <div class="item-title">技秀堂の推しポイント</div>
                    <div class="item-content">お客様の想いが的確に伝わる物や手段を作り、お客様の事業に加工技術で貢献するという理念</div>
                </div>
            </div>

            <!-- メッセージセクション -->
            <div class="message-box">
                <div class="item-title">メッセージ</div>
                <div class="item-content-large">お気軽になんでもご相談ください！</div>
            </div>
        </div>
    </div>
</body>
</html>
